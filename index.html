<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>আমার বন্ধু</title>
  <style>
    body {
      font-family: "SolaimanLipi", sans-serif;
      background-color: #f9f9f9;
      padding: 20px;
    }
    .banner {
      text-align: center;
      background-color: #6AB04A;
      color: white;
      padding: 15px;
      margin-bottom: 30px;
      border-radius: 10px;
      font-size: 24px;
    }
    .container {
      max-width: 600px;
      background-color: #fff;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    img {
      max-width: 100%;
      border-radius: 10px;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 8px;
    }
    .label {
      font-weight: bold;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="banner">আমার বন্ধু</div>
  <div id="friends-wrapper"></div>

  <script>

    // পেজে যোগ করা
    const wrapper = document.getElementById('friends-wrapper');
    friends.forEach(friend => {
      wrapper.innerHTML += friend;
    });

</body>
</html>
